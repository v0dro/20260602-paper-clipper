name: PaperClipper
options:
  bundleIdPrefix: com.captureken
  deploymentTarget:
    iOS: "17.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  PaperClipper:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - PaperClipper
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captureken.paperclipper
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        # Code signing: automatic. DEVELOPMENT_TEAM comes from Config.xcconfig (blank by default).
        # Simulator builds need nothing; a physical-device build/install needs your team id set.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    info:
      path: PaperClipper/Info.plist
      properties:
        CFBundleDisplayName: Paper Clipper AI
        UILaunchScreen: {}
        NSCameraUsageDescription: "Used to photograph newspaper clippings."
        NSPhotoLibraryUsageDescription: "Used to import clipping photos."
        # Read at runtime by AppConfig. Values come from Config.xcconfig.
        SERVER_URL: $(SERVER_URL)
        PROXY_TOKEN: $(PROXY_TOKEN)
        # Google Sign-In callback scheme (filled once GoogleService-Info.plist exists).
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(REVERSED_CLIENT_ID)
        # Receive images shared/opened from other apps ("Open in / Copy to Paper Clipper AI").
        # Delivered to the app via .onOpenURL. (Appearing in the top share-sheet row would need a
        # Share Extension + App Group, which requires a paid Apple Developer team.)
        CFBundleDocumentTypes:
          - CFBundleTypeName: Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.image
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
    scheme:
      testTargets:
        - PaperClipperTests
        - PaperClipperUITests
      gatherCoverageData: false

  PaperClipperTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - PaperClipperTests
    dependencies:
      - target: PaperClipper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PaperClipper.app/PaperClipper"
        BUNDLE_LOADER: "$(TEST_HOST)"

  PaperClipperUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - PaperClipperUITests
    dependencies:
      - target: PaperClipper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TEST_TARGET_NAME: PaperClipper
